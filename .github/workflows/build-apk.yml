name: Build Flutter APK

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.35.7'
          cache: true

      - name: Verify Flutter version
        run: flutter --version

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze code (non-blocking)
        run: flutter analyze --no-fatal-infos --no-fatal-warnings
        continue-on-error: true

      - name: Generate launcher icons
        run: dart run flutter_launcher_icons
        continue-on-error: true

      - name: Build release APK (arm64)
        run: |
          flutter build apk --release \
            --target-platform android-arm64 \
            --split-per-abi \
            --tree-shake-icons

      - name: Show APK size breakdown
        run: |
          echo "=== APK Files ==="
          ls -lh build/app/outputs/flutter-apk/*.apk
          echo ""
          echo "=== Total APK size ==="
          du -sh build/app/outputs/flutter-apk/

      - name: Upload release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ommon-release-apk-arm64-${{ github.sha }}
          path: |
            build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
          if-no-files-found: error
          retention-days: 30

      - name: Generate size report
        run: |
          echo "## APK Size Report" > size_report.md
          echo "" >> size_report.md
          echo "| File | Size |" >> size_report.md
          echo "|------|------|" >> size_report.md
          for apk in build/app/outputs/flutter-apk/*.apk; do
            name=$(basename "$apk")
            size=$(du -h "$apk" | cut -f1)
            echo "| $name | $size |" >> size_report.md
          done
          cat size_report.md

      - name: Upload size report
        uses: actions/upload-artifact@v4
        with:
          name: apk-size-report-${{ github.sha }}
          path: size_report.md
          retention-days: 30
